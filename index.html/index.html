<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIK - Jesus Is King</title>

<meta name="theme-color" content="#0d0d0d">

<style>
body {
  margin: 0;
  background: linear-gradient(160deg, #0b0b0b, #1a1a1a);
  color: #d4af37;
  font-family: Georgia, serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 25px 18px;
}

h1 {
  font-size: 22px;
  letter-spacing: 4px;
}

button {
  width: 100%;
  max-width: 400px;
  padding: 12px;
  margin: 6px 0;
  background: transparent;
  border: 1px solid #d4af37;
  color: #d4af37;
  font-size: 12px;
}

button:active {
  background: #d4af37;
  color: black;
}

#verse {
  margin-top: 30px;
  font-size: 18px;
  text-align: center;
  max-width: 400px;
}

#reference {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.8;
}

.small {
  margin-top: 20px;
  font-size: 11px;
  opacity: 0.6;
}
</style>
</head>
<body>

<h1>JIK</h1>

<button onclick="getVerse()">RANDOM VERSE</button>
<button onclick="getMoodVerse('strength')">STRENGTH</button>
<button onclick="getMoodVerse('peace')">PEACE</button>
<button onclick="getMoodVerse('anxiety')">ANXIETY</button>
<button onclick="getMoodVerse('business')">BUSINESS</button>

<div id="verse"></div>
<div id="reference"></div>

<button onclick="saveFavorite()">SAVE FAVORITE</button>
<button onclick="viewFavorites()">VIEW FAVORITES</button>

<div class="small" id="streak"></div>

<script>
let currentVerse = "";
let currentRef = "";
let loading = false;

const moodKeywords = {
  strength: ["strong", "strength", "courage", "power", "mighty"],
  peace: ["peace", "rest", "calm", "quiet", "still"],
  anxiety: ["fear", "afraid", "worry", "trouble", "distress"],
  business: ["work", "labor", "plans", "prosper", "diligent"]
};

async function fetchRandomVerse() {
  const response = await fetch("https://labs.bible.org/api/?passage=random&type=json");
  const data = await response.json();
  return data[0];
}

async function getVerse() {
  if (loading) return;
  loading = true;
  showLoading();

  try {
    const verse = await fetchRandomVerse();
    displayVerse(verse.text, verse.bookname + " " + verse.chapter + ":" + verse.verse, "RANDOM");
  } catch {
    showError();
  }

  loading = false;
}

async function getMoodVerse(mood) {
  if (loading) return;
  loading = true;
  showLoading();

  try {
    let attempts = 0;

    while (attempts < 12) {
      const verse = await fetchRandomVerse();
      const textLower = verse.text.toLowerCase();

      if (moodKeywords[mood].some(word => textLower.includes(word))) {
        displayVerse(
          verse.text,
          verse.bookname + " " + verse.chapter + ":" + verse.verse,
          mood.toUpperCase()
        );
        loading = false;
        return;
      }

      attempts++;
    }

    // fallback if no keyword match found
    const fallback = await fetchRandomVerse();
    displayVerse(
      fallback.text,
      fallback.bookname + " " + fallback.chapter + ":" + fallback.verse,
      mood.toUpperCase()
    );

  } catch {
    showError();
  }

  loading = false;
}

function displayVerse(text, reference, label) {
  currentVerse = text;
  currentRef = reference;

  document.getElementById("verse").innerText = text;
  document.getElementById("reference").innerText =
    reference + " • " + label;

  updateStreak();
}

function showLoading() {
  document.getElementById("verse").innerText = "Searching...";
  document.getElementById("reference").innerText = "";
}

function showError() {
  document.getElementById("verse").innerText = "Unable to load verse.";
  document.getElementById("reference").innerText = "";
}

function updateStreak() {
  let today = new Date().toDateString();
  let lastVisit = localStorage.getItem("lastVisit");
  let streak = parseInt(localStorage.getItem("streak")) || 0;

  if (lastVisit !== today) {
    streak++;
    localStorage.setItem("streak", streak);
    localStorage.setItem("lastVisit", today);
  }

  document.getElementById("streak").innerText =
    "Current Streak: " + streak + " days";
}
</script>

</body>

</html>
