<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIK - Jesus Is King</title>

<meta name="theme-color" content="#0d0d0d">

<style>
body {
  margin: 0;
  background: linear-gradient(160deg, #0b0b0b, #1a1a1a);
  color: #d4af37;
  font-family: Georgia, serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 25px 18px;
}

h1 {
  font-size: 22px;
  letter-spacing: 4px;
}

button {
  width: 100%;
  max-width: 400px;
  padding: 12px;
  margin: 6px 0;
  background: transparent;
  border: 1px solid #d4af37;
  color: #d4af37;
  font-size: 12px;
}

button:active {
  background: #d4af37;
  color: black;
}

#verse {
  margin-top: 30px;
  font-size: 18px;
  text-align: center;
  max-width: 400px;
}

#reference {
  margin-top: 10px;
  font-size: 13px;
  opacity: 0.8;
}

.small {
  margin-top: 20px;
  font-size: 11px;
  opacity: 0.6;
}
</style>
</head>
<body>

<h1>JIK</h1>

<button onclick="getVerse()">RANDOM</button>

<div id="verse"></div>
<div id="reference"></div>

<button onclick="saveFavorite()">SAVE FAVORITE</button>
<button onclick="viewFavorites()">VIEW FAVORITES</button>

<div class="small" id="streak"></div>

<script>
async function getVerse() {
  document.getElementById("verse").innerText = "Loading...";
  document.getElementById("reference").innerText = "";

  try {
    const response = await fetch("https://bible-api.com/?random=verse");
    const data = await response.json();

    document.getElementById("verse").innerText = data.text;
    document.getElementById("reference").innerText = data.reference;
  } catch (error) {
    document.getElementById("verse").innerText = "Fetch failed.";
  }
}
</script>

</body>

</html>
